<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supercopa Bandas Rítmicas - Santa 2026</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        body {
            background-image: linear-gradient(rgba(15, 23, 42, 0.75), rgba(15, 23, 42, 0.75)), url('fondo.jpg');
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-size: cover;
            background-color: #0b1329; 
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        /* Paneles con 10% de opacidad y efecto blur estilo cristal */
        .glass-panel, .card, table {
            background-color: rgba(0, 0, 0, 0.1) !important;
            backdrop-filter: blur(10px) !important;
            -webkit-backdrop-filter: blur(10px) !important;
            border: 1px solid rgba(255, 255, 255, 0.15) !important;
            border-radius: 12px;
        }
        .table { color: #ffffff !important; }
        .table th {
            background-color: rgba(255, 255, 255, 0.05) !important;
            color: #ffc107 !important;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2) !important;
        }
        .table td { border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important; vertical-align: middle; }
        .clickable-row { cursor: pointer; transition: background 0.2s; }
        .clickable-row:hover { background-color: rgba(255, 255, 255, 0.15) !important; }
        .student-card { transition: transform 0.2s; }
        .student-card:hover { transform: translateY(-3px); }
    </style>
</head>
<body>

    <header class="text-center py-4 mb-4" style="background: rgba(0,0,0,0.3); border-bottom: 1px solid rgba(255,255,255,0.1);">
        <h1 class="fw-bold text-warning mb-1">SUPERCOPA 2026</h1>
        <p class="lead mb-0 text-white-50">Panel Automático multihojas (23 Colegios)</p>
    </header>

    <!-- PANTALLA PRINCIPAL: RANKING -->
    <main id="contenedor-principal-ranking" class="container">
        <div class="glass-panel p-4 mb-4">
            <input type="text" id="buscador-colegio" class="form-control bg-transparent text-white border-secondary" placeholder="Buscar colegio participante...">
        </div>

        <div class="glass-panel p-3 table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th class="text-center" style="width: 100px;">Puesto</th>
                        <th>Institución Educativa (Haga clic para ver detalles)</th>
                    </tr>
                </thead>
                <tbody id="tabla-cuerpo-ranking">
                    <tr><td colspan="2" class="text-center text-white-50">Cargando las 23 delegaciones desde Google Sheets...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- PANTALLA DE DETALLE (SE ACTIVA AL CLICKEAR) -->
    <div id="vista-detalle-colegio" style="display: none;" class="container mb-5">
        <button class="btn btn-outline-warning mb-4" onclick="volverAlInicio()">
            <i class="fas fa-arrow-left me-2"></i> Volver al Ranking
        </button>
        
        <div class="row g-4">
            <!-- Izquierda: Datos del Colegio -->
            <div class="col-lg-4">
                <div class="glass-panel p-4 text-center">
                    <h3 id="detalle-nombre-colegio" class="fw-bold text-warning mb-3"></h3>
                    <hr class="border-light opacity-25">
                    <div class="text-start mt-3">
                        <p><strong><i class="fas fa-calendar-alt text-warning me-2"></i> Fundación:</strong> <span id="detalle-fundacion" class="text-white-50">Cargando...</span></p>
                        <p><strong><i class="fas fa-award text-warning me-2"></i> Premios y Logros:</strong></p>
                        <ul id="detalle-premios" class="list-unstyled ps-3 text-white-50"></ul>
                    </div>
                </div>
            </div>
            <!-- Derecha: Alumnos e Instrumentos -->
            <div class="col-lg-8">
                <div class="glass-panel p-4">
                    <h4 class="fw-bold text-white mb-4 border-bottom pb-2"><i class="fas fa-users text-info me-2"></i> Alumnos e Instrumentos</h4>
                    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-3" id="contenedor-alumnos-detalle"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 🛠️ CONFIGURACIÓN: CAMBIA ESTO CON TU ID
        // ==========================================
        // Tu ID se encuentra en la URL de tu navegador entre el "/d/" y el "/edit"
        const GOOGLE_SHEET_ID = "1gGIno67E-w31C6R-S2_b-2H-L64E9X6_oO-vXN7tN0I"; 

        // Lista manual temporal de tus 23 colegios (Deben llamarse EXACTAMENTE igual a tus pestañas del Sheet)
        // Esto evita tener que descargar el archivo completo de golpe y carga directo la pestaña correcta al dar clic.
        const LISTA_COLEGIOS = [
        "I.E. NAMORA"
        "I.E. EXPERIMENTAL UNS"
        "I.E. GLORIOSA 329"
        "I.E. JOSÉ GALVEZ"
        "I.E. REPÚBLICA ARGENTINA"
        "I.E. PEDRO PABLO ATUSPARIA"
        "I.E. REPÚBLICA DE CHILE"
        "I.E. SAN JACINTO"
"I.E.P. EL SEÑOR ES MI PASTOR"
"I.E.P. G.M.L.J. ORBEGOSO"
"I.E. ABELARDO QUIÑONES"
"I.E. CONSTRUCTORES DEL SABER"
"I.E. LA HUACA"
"I.E. LAS BRISAS"
"I.E. RINCONADA"
"I.E. YUGOSLAVO"
"I.E.P. SANTA TERESITA DE JESÚS"
"I.E.P. JEAN PIAGET"
"I.E.P. SAN FELIPE"
"I.E.P. SANTA TERESITA"
"I.E. ANDRES AVELINO CACERES"
"I.E.P. SANTA URSULA"
"I.E. EX 314"
            // Pega aquí los nombres de tus otros colegios separados por comas y entre comillas...
        ];

        // 1. INICIALIZAR LA TABLA PRINCIPAL AL CARGAR
        window.onload = function() {
            renderizarTablaInicio(LISTA_COLEGIOS);
        };

        // 2. MOSTRAR LOS COLEGIOS EN LA TABLA PRINCIPAL
        function renderizarTablaInicio(lista) {
            const tbody = document.getElementById('tabla-cuerpo-ranking');
            tbody.innerHTML = '';

            lista.forEach((nombreColegio, index) => {
                tbody.innerHTML += `
                    <tr class="clickable-row" onclick="cargarYVerDetalle('${nombreColegio}')">
                        <td class="text-center fw-bold text-warning">#${index + 1}</td>
                        <td class="fw-bold"><i class="fas fa-school text-info me-2"></i> ${nombreColegio}</td>
                    </tr>
                `;
            });
        }

        // 3. CONSULTAR LA PESTAÑA ESPECÍFICA EN GOOGLE SHEETS EVITANDO EL BLOQUEO CORS
        async function cargarYVerDetalle(nombrePestañaColegio) {
            // Cambiar de vista inmediatamente para dar feedback visual
            document.getElementById('contenedor-principal-ranking').style.display = 'none';
            document.getElementById('vista-detalle-colegio').style.display = 'block';
            document.getElementById('detalle-nombre-colegio').innerText = nombrePestañaColegio;
            
            document.getElementById('detalle-fundacion').innerText = "Cargando...";
            document.getElementById('detalle-premios').innerHTML = "";
            document.getElementById('contenedor-alumnos-detalle').innerHTML = `<div class="text-center w-100 py-4"><i class="fas fa-spinner fa-spin fa-2x text-warning"></i><p class="mt-2 text-white-50">Obteniendo lista de alumnos...</p></div>`;

            // Enlace seguro de lectura por pestañas individuales a través de la API de Visualización
            const urlGviz = `https://docs.google.com/spreadsheets/d/${1km_OFRLZGEBRTPcQDJjy36gyRgxMF2SbtkYG1DGd2uE}/gviz/tq?sheet=${encodeURIComponent(nombrePestañaColegio)}`;

            try {
                const res = await fetch(urlGviz);
                const texto = await res.text();
                
                // Limpiar el envoltorio de la respuesta JSON segura de Google
                const jsonText = texto.substring(texto.indexOf("{"), texto.lastIndexOf("}") + 1);
                const data = JSON.parse(jsonText);
                
                const columnas = data.table.cols;
                const filas = data.table.rows;

                // Crear un mapa dinámico de los encabezados para saber qué columna es cuál
                let mapaEncabezados = {};
                columnas.forEach((col, idx) => {
                    if(col.label) mapaEncabezados[col.label.trim().toLowerCase()] = idx;
                });

                // IDs por defecto si no coinciden las minúsculas/mayúsculas
                const idxFundacion = mapaEncabezados["fundacion"] ?? 0;
                const idxPremios = mapaEncabezados["premios"] ?? 1;
                const idxNombre = mapaEncabezados["alumnonombre"] ?? 2;
                const idxPuesto = mapaEncabezados["alumnopuesto"] ?? 3;
                const idxFoto = mapaEncabezados["alumnofoto"] ?? 4;

                const txtFundacion = document.getElementById('detalle-fundacion');
                const contenedorPremios = document.getElementById('detalle-premios');
                const contenedorAlumnos = document.getElementById('contenedor-alumnos-detalle');
                
                contenedorAlumnos.innerHTML = "";

                if (filas.length === 0) {
                    txtFundacion.innerText = "No registrada";
                    contenedorAlumnos.innerHTML = `<div class="col-12 text-white-50 text-center py-3">No hay datos en esta pestaña.</div>`;
                    return;
                }

                // 1. Datos generales (Fila 0)
                const celdaFundacion = filas[0].c[idxFundacion];
                txtFundacion.innerText = celdaFundacion ? celdaFundacion.v : "No registrada";

                const celdaPremios = filas[0].c[idxPremios];
                if (celdaPremios && celdaPremios.v) {
                    const arrayPremios = celdaPremios.v.split(",");
                    contenedorPremios.innerHTML = arrayPremios.map(p => `<li><i class="fas fa-medal text-warning me-2"></i>${p.trim()}</li>`).join('');
                } else {
                    contenedorPremios.innerHTML = "<li><i class="fas fa-info-circle text-white-50 me-2"></i>Ninguno registrado</li>";
                }

                // 2. Recorrer todos los Alumnos
                let contadorAlumnos = 0;
                filas.forEach(fila => {
                    const celdaNombre = fila.c[idxNombre];
                    if (celdaNombre && celdaNombre.v) {
                        contadorAlumnos++;
                        const celdaPuesto = fila.c[idxPuesto];
                        const celdaFoto = fila.c[idxFoto];
                        
                        const nombre = celdaNombre.v;
                        const puesto = celdaPuesto ? celdaPuesto.v : "Integrante";
                        const fotoUrl = celdaFoto ? celdaFoto.v : "https://via.placeholder.com/150";

                        contenedorAlumnos.innerHTML += `
                            <div class="col">
                                <div class="card p-3 text-center student-card h-100" style="background-color: rgba(255,255,255,0.05) !important;">
                                    <img src="${fotoUrl}" alt="${nombre}" class="rounded-circle mx-auto mb-2" style="width: 80px; height: 80px; object-fit: cover; border: 2px solid rgba(255,255,255,0.3);">
                                    <h6 class="mb-1 text-white fw-bold">${nombre}</h6>
                                    <p class="small text-warning mb-3"><i class="fas fa-music me-1"></i>${puesto}</p>
                                    <a href="${fotoUrl}" download="${nombre}.jpg" target="_blank" class="btn btn-sm btn-dark w-100 border-secondary">
                                        <i class="fas fa-download me-1"></i> Foto
                                    </a>
                                </div>
                            </div>
                        `;
                    }
                });

                if(contadorAlumnos === 0) {
                    contenedorAlumnos.innerHTML = `<div class="col-12 text-white-50 text-center py-3">No hay alumnos listados en esta pestaña.</div>`;
                }

            } catch (error) {
                console.error("Error al obtener datos de Google Sheets via GViz:", error);
                document.getElementById('contenedor-alumnos-detalle').innerHTML = `<div class="col-12 text-danger text-center py-3">Error de conexión. Asegúrate de que el documento tenga el acceso como "Cualquier persona con el enlace puede ver".</div>`;
            }
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function volverAlInicio() {
            document.getElementById('vista-detalle-colegio').style.display = 'none';
            document.getElementById('contenedor-principal-ranking').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // CONTROLADOR DEL BUSCADOR EN VIVO
        document.getElementById('buscador-colegio').addEventListener('input', function(e){
            const busqueda = e.target.value.toLowerCase();
            const filas = document.querySelectorAll('#tabla-cuerpo-ranking tr');
            filas.forEach(fila => {
                fila.style.display = fila.innerText.toLowerCase().includes(busqueda) ? '' : 'none';
            });
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
