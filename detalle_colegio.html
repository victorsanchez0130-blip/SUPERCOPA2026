<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del Colegio - Supercopa</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0b1329; 
            --card-bg: rgba(255, 255, 255, 0.08); 
            --card-border: rgba(255, 255, 255, 0.15);
            --glass-blur: blur(10px);
            --text-main: #f8fafc;
            --text-muted: #cbd5e1;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg); 
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        .info-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
        }

        /* ÍCONO / LOGO AGRANDADO */
        .icon-shield { 
            font-size: 110px; 
            margin-bottom: 25px; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 220px;
        }

        /* LOGO DEL COLEGIO MÁS GRANDE */
        .school-logo {
            max-width: 220px;
            max-height: 220px;
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: 16px;
            filter: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.5));
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        h1 { font-size: 32px; margin-bottom: 10px; color: #ffffff; letter-spacing: 0.5px; }
        .docente-name { font-size: 20px; color: var(--primary); font-weight: 600; margin-bottom: 30px; }

        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            border-top: 1px solid var(--border);
            padding-top: 30px;
        }

        .detail-box {
            background: rgba(0, 0, 0, 0.2);
            padding: 18px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .detail-label { font-size: 13px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 5px; font-weight: 600; }
        .detail-value { font-size: 22px; font-weight: bold; color: #ffffff; }

        .students-section {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
        }

        .students-section h2 {
            font-size: 20px;
            margin-bottom: 20px;
            color: #ffffff;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .students-table { width: 100%; border-collapse: collapse; text-align: left; }
        .students-table th, .students-table td { padding: 14px 15px; border-bottom: 1px solid var(--border); font-size: 15px; }
