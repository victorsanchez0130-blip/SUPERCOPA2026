<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del Colegio - Supercopa</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0b1329; 
            --card-bg: rgba(255, 255, 255, 0.08); 
            --card-border: rgba(255, 255, 255, 0.15);
            --glass-blur: blur(10px);
            --text-main: #f8fafc;
            --text-muted: #cbd5e1;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg); 
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 750px;
            max-width: 800px;
        }

        .info-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
        }

        /* ÍCONO / LOGO AGRANDADO */
        .icon-shield { 
            font-size: 60px; 
            margin-bottom: 20px; 
            font-size: 110px; 
            margin-bottom: 25px; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90px;
            min-height: 220px;
        }

        /* LOGO DEL COLEGIO MÁS GRANDE */
        .school-logo {
            max-width: 110px;
            max-height: 110px;
            max-width: 220px;
            max-height: 220px;
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: 12px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4));
            border-radius: 16px;
            filter: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.5));
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        h1 { font-size: 28px; margin-bottom: 10px; color: #ffffff; letter-spacing: 0.5px; }
        .docente-name { font-size: 18px; color: var(--primary); font-weight: 600; margin-bottom: 30px; }
        h1 { font-size: 32px; margin-bottom: 10px; color: #ffffff; letter-spacing: 0.5px; }
        .docente-name { font-size: 20px; color: var(--primary); font-weight: 600; margin-bottom: 30px; }

        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            border-top: 1px solid var(--border);
            padding-top: 30px;
        }

        .detail-box {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            padding: 18px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .detail-label { font-size: 12px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 5px; font-weight: 600; }
        .detail-value { font-size: 20px; font-weight: bold; color: #ffffff; }
        .detail-label { font-size: 13px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 5px; font-weight: 600; }
        .detail-value { font-size: 22px; font-weight: bold; color: #ffffff; }

        .students-section {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
        }

        .students-section h2 {
            font-size: 20px;
            margin-bottom: 20px;
            color: #ffffff;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .students-table { width: 100%; border-collapse: collapse; text-align: left; }
        .students-table th, .students-table td { padding: 12px 15px; border-bottom: 1px solid var(--border); font-size: 14px; }
        .students-table th, .students-table td { padding: 14px 15px; border-bottom: 1px solid var(--border); font-size: 15px; }
        .students-table th { background: rgba(0, 0, 0, 0.3); color: var(--text-muted); font-weight: 600; text-transform: uppercase; font-size: 12px; }
        .students-table tr:last-child td { border-bottom: none; }
        .student-num { font-weight: bold; color: var(--primary); width: 50px; }

        .btn-download {
            background: rgba(99, 102, 241, 0.2);
            color: #a5b4fc;
            border: 1px solid rgba(99, 102, 241, 0.4);
            padding: 6px 12px;
            border-radius: 6px;
            padding: 8px 14px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 12px;
            font-size: 13px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            gap: 6px;
            transition: all 0.2s;
        }
        .btn-download:hover { background: var(--primary); color: white; border-color: var(--primary); }

        .no-students { text-align: center; padding: 20px; color: var(--text-muted); font-style: italic; }
        .no-students { text-align: center; padding: 25px; color: var(--text-muted); font-style: italic; }

        .actions { text-align: center; }
        .btn-back { display: inline-block; background: rgba(255, 255, 255, 0.1); color: white; border: 1px solid var(--card-border); padding: 12px 30px; border-radius: 10px; text-decoration: none; font-weight: 500; transition: all 0.2s; cursor: pointer; }
        .btn-back:hover { background: var(--primary); border-color: var(--primary); }
    </style>
</head>
<body>

    <div class="container">
        <div class="info-card">
            <div class="icon-shield" id="containerLogo">🏫</div>
            <h1 id="lblColegio">Cargando Colegio...</h1>
            <div class="docente-name" id="lblDocente">PROF. Cargando...</div>

            <div class="details-grid">
                <div class="detail-box">
                    <div class="detail-label">Categoría asignada</div>
                    <div class="detail-value" id="lblCategoria">-</div>
                </div>
                <div class="detail-box">
                    <div class="detail-label">Puntaje Actual</div>
                    <div class="detail-value" id="lblPuntos" style="color: #4ade80;">0 pts</div>
                </div>
            </div>
        </div>

        <div class="students-section">
            <h2>🎵 Lista de Alumnos e Instrumentos</h2>
            <table class="students-table">
                <thead>
                    <tr>
                        <th class="student-num">N°</th>
                        <th>Nombre del Alumno</th>
                        <th>Instrumento</th>
                        <th style="text-align: center;">Foto Carnet</th>
                    </tr>
                </thead>
                <tbody id="studentsTableBody">
                    <tr>
                        <td colspan="4" class="no-students">Cargando integrantes desde Google Sheets...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="actions">
            <a href="#" class="btn-back" onclick="window.close(); return false;">Cerrar Ventana</a>
        </div>
    </div>

    <script>
        // Enlace CSV de la pestaña de Alumnos
        const URL_SHEETS_ALUMNOS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR_DY7IP73Oh_vzcPGqQ_fLiv2RFOlH1XK-IPIcrDV3pM9wHodMC3zh3or3LYm6TEKTHPHGGD0TRstV/pub?output=csv";
        
        // Enlace CSV de la pestaña de Colegios (obtenido de tu enlace proporcionado)
        const URL_SHEETS_COLEGIOS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRUG5hRy0_f9-agtpJK87yq3NMf06aJ2C4W0WYqhMiBbXPi-ylFTxfmOHII4Mbm8f8_RBmBBmPc_XoM/pub?output=csv";

        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                colegio: params.get('colegio') || '',
                docente: params.get('docente') || 'Docente No Asignado',
                categoria: params.get('categoria') || 'No Asignada',
                puntos: params.get('puntos') || '0',
                foto: params.get('foto') || ''
            };
        }

        // Limpiar cadenas para evitar fallos por tildes o mayúsculas
        function cleanText(str) {
            return (str || '')
                .toLowerCase()
                .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
                .replace(/[^a-z0-9]/g, "");
        }

        // Convertir enlaces de Google Drive a URLs de vista directa
        function fixImageUrl(url) {
            if (!url) return '';
            let cleanUrl = url.trim();
            if (cleanUrl.includes('drive.google.com')) {
                const idMatch = cleanUrl.match(/\/d\/([^\/]+)/) || cleanUrl.match(/id=([^&]+)/);
                if (idMatch && idMatch[1]) {
                    return `https://drive.google.com/uc?export=view&id=${idMatch[1]}`;
                }
            }
            return cleanUrl;
        }

        function parseCSVLine(text) {
            let p = '', r = [];
            let q = false;
            for (let i = 0; i < text.length; i++) {
                let c = text[i];
                if (c === '"') {
                    q = !q;
                } else if (c === ',' && !q) {
                    r.push(p.trim());
                    p = '';
                } else {
                    p += c;
                }
            }
            r.push(p.trim());
            return r;
        }

        async function cargarLogoColegio(nombreColegio, fotoUrlDirecta) {
            const containerLogo = document.getElementById('containerLogo');

            // Si la foto vino por la URL del navegador
            if (fotoUrlDirecta && fotoUrlDirecta.startsWith('http')) {
                containerLogo.innerHTML = `<img src="${fotoUrlDirecta}" class="school-logo" alt="Logo ${nombreColegio}">`;
                const imgUrl = fixImageUrl(fotoUrlDirecta);
                containerLogo.innerHTML = `<img src="${imgUrl}" class="school-logo" alt="Logo" onerror="this.onerror=null; this.parentElement.innerHTML='🏫';">`;
                return;
            }

            // Buscar el logo en la hoja de Google Sheets
            try {
                const response = await fetch(URL_SHEETS_COLEGIOS);
                const dataText = await response.text();
                const lines = dataText.split(/\r?\n/);

                let logoEncontrado = false;
                let logoEncontrado = "";
                const targetColegio = cleanText(nombreColegio);

                for (let i = 1; i < lines.length; i++) {
                    if (!lines[i].trim()) continue;
                    const cols = parseCSVLine(lines[i]);
                    
                    const sheetColegio = cols[0] || "";
                    const sheetLogo = cols.find(col => col.startsWith("http://") || col.startsWith("https://")) || "";

                    if (sheetColegio.toLowerCase() === nombreColegio.toLowerCase() && sheetLogo !== "") {
                        containerLogo.innerHTML = `<img src="${sheetLogo}" class="school-logo" alt="Logo ${nombreColegio}">`;
                        logoEncontrado = true;
                        break;
                    const coincide = cols.some(col => cleanText(col) === targetColegio);

                    if (coincide) {
                        const urlCol = cols.find(c => c.toLowerCase().includes('http://') || c.toLowerCase().includes('https://'));
                        if (urlCol) {
                            logoEncontrado = fixImageUrl(urlCol);
                            break;
                        }
                    }
                }

                if (!logoEncontrado) {
                if (logoEncontrado) {
                    containerLogo.innerHTML = `<img src="${logoEncontrado}" class="school-logo" alt="Logo ${nombreColegio}" onerror="this.onerror=null; this.parentElement.innerHTML='🏫';">`;
                } else {
                    containerLogo.innerHTML = "🏫";
                }
            } catch (error) {
                console.warn("No se pudo cargar el logo desde Sheets:", error);
                console.warn("Error cargando el logo desde Google Sheets:", error);
                containerLogo.innerHTML = "🏫";
            }
        }

        async function cargarAlumnosDesdeSheets(nombreColegio) {
            const tbody = document.getElementById('studentsTableBody');

            try {
                const response = await fetch(URL_SHEETS_ALUMNOS);
                const dataText = await response.text();
                const lines = dataText.split(/\r?\n/);

                let htmlContent = "";
                let contador = 1;
                const targetColegio = cleanText(nombreColegio);

                for (let i = 1; i < lines.length; i++) {
                    if (!lines[i].trim()) continue;

                    const cols = parseCSVLine(lines[i]);

                    const sheetColegio = cols[0] || "";
                    const sheetNombre = cols[2] || "";
                    const sheetInstrumento = cols[3] || "";
                    const sheetFoto = cols[4] || "#";
                    const sheetFoto = fixImageUrl(cols[4] || "#");

                    if (sheetColegio.toLowerCase() === nombreColegio.toLowerCase()) {
                    if (cleanText(sheetColegio) === targetColegio) {
                        htmlContent += `
                            <tr>
                                <td class="student-num">${contador}</td>
                                <td style="font-weight: 500;">${sheetNombre}</td>
                                <td>${sheetInstrumento}</td>
                                <td style="text-align: center;">
                                    <a href="${sheetFoto}" download="${sheetNombre.replace(/\s+/g, '_')}.jpg" target="_blank" class="btn-download">
                                        📥 Descargar Carnet
                                    </a>
                                </td>
                            </tr>
                        `;
                        contador++;
                    }
                }

                if (htmlContent === "") {
                    tbody.innerHTML = `<tr><td colspan="4" class="no-students">No hay alumnos registrados aún para este colegio en la pestaña seleccionada.</td></tr>`;
                } else {
                    tbody.innerHTML = htmlContent;
                }

            } catch (error) {
                console.error(error);
                tbody.innerHTML = `<tr><td colspan="4" class="no-students" style="color:#ef4444;">Error al conectar con Google Sheets. Asegúrate de haber publicado la pestaña correcta de Alumnos.</td></tr>`;
                tbody.innerHTML = `<tr><td colspan="4" class="no-students" style="color:#ef4444;">Error al conectar con Google Sheets.</td></tr>`;
            }
        }

        window.onload = function() {
            const datos = getUrlParams();

            const txtColegio = decodeURIComponent(datos.colegio);
            document.getElementById('lblColegio').innerText = txtColegio;
            document.getElementById('lblColegio').innerText = txtColegio || "Colegio Sin Nombre";
            document.getElementById('lblDocente').innerText = "Prof. " + decodeURIComponent(datos.docente);
            document.getElementById('lblCategoria').innerText = "Categoría " + decodeURIComponent(datos.categoria);
            document.getElementById('lblPuntos').innerText = decodeURIComponent(datos.puntos) + " pts";

            if (txtColegio) {
                cargarLogoColegio(txtColegio, datos.foto);
                cargarAlumnosDesdeSheets(txtColegio);
            }
        };
    </script>
</body>
</html>
